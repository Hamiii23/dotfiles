general {
    gaps_in = 2
    gaps_out = 5
    border_size = 1
    col.active_border = rgba(63a0ffee)
    col.inactive_border = rgba(ffffff10)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 14

    active_opacity = 0.96
    inactive_opacity = 0.88

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000066)
        color_inactive = rgba(00000033)
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        vibrancy = 0.2
        vibrancy_darkness = 0.0
        special = true
        new_optimizations = true
    }
}
